<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Library app</title>
  </head>
  <body>
    <div id="library"></div>
    <button command="show-modal" commandfor="my-dialog">Add new book</button>

    <dialog id="my-dialog">
      <form action="">
        <label for="title">Title:</label>
        <input type="text" name="title" id="title" required /> <br />

        <label for="author">Author:</label>
        <input type="text" name="author" id="author" required /> <br />

        <label for="pages">Pages</label>
        <input type="number" name="pages" id="pages" required /> <br />

        <label for="read">Have you read it?</label>
        <input type="checkbox" name="read" id="read" /> <br />

        <button type="submit" id="addBook" onclick="addBookToLibrary()">
          Add to the library
        </button>
        <br />
      </form>
      <button commandfor="my-dialog" command="close">Close</button>
    </dialog>
  </body>
  <script src="script.js"></script>
</html>
